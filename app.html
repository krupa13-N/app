<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🌤️ WeatherApp — No API Key Needed</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;color:#fff;overflow-x:hidden;min-height:100vh;}
#skyCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;
  background:linear-gradient(180deg,rgba(0,0,0,0.05)0%,rgba(0,0,0,0.15)50%,rgba(0,0,0,0.6)100%);}
#app{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;}
nav{padding:1rem 2.5rem;display:flex;justify-content:space-between;align-items:center;
  background:rgba(0,0,0,0.35);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.1);position:sticky;top:0;z-index:100;}
.brand{font-family:'Bebas Neue',cursive;font-size:2.2rem;letter-spacing:4px;
  background:linear-gradient(135deg,#fff,#74d7ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nav-right{display:flex;gap:0.7rem;align-items:center;}
.btn{padding:0.7rem 1.6rem;border-radius:50px;border:none;cursor:pointer;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:0.95rem;transition:all 0.3s;}
.btn-glow{background:linear-gradient(135deg,#00c6ff,#0072ff);color:#fff;box-shadow:0 4px 20px rgba(0,198,255,0.4);}
.btn-glow:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,198,255,0.6);}
.btn-ghost{background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.25);color:#fff;backdrop-filter:blur(8px);}
.btn-ghost:hover{background:rgba(255,255,255,0.2);}
.btn-sm{padding:0.4rem 1rem;font-size:0.88rem;border-radius:30px;}
.btn-green{background:rgba(0,230,118,0.15);border:1.5px solid rgba(0,230,118,0.4);color:#00e676;backdrop-filter:blur(8px);}
.btn-green:hover{background:rgba(0,230,118,0.3);}
main{flex:1;padding:2.5rem 2rem;max-width:1350px;margin:0 auto;width:100%;}
.glass{background:rgba(255,255,255,0.07);backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,0.16);border-radius:28px;}
.glass-dark{background:rgba(0,0,0,0.3);backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,0.1);border-radius:28px;}

/* BANNER */
#weatherBanner{text-align:center;padding:0.75rem 2rem;font-size:1rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:2rem;border-radius:50px;background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.2);display:none;}

/* FREE API BADGE */
.free-badge{display:inline-flex;align-items:center;gap:0.5rem;padding:0.5rem 1.2rem;background:rgba(0,230,118,0.12);border:1px solid rgba(0,230,118,0.3);border-radius:50px;color:#00e676;font-size:0.9rem;font-weight:800;margin-bottom:1.5rem;}

/* SEARCH */
.search-row{display:flex;gap:0.75rem;margin-bottom:0.4rem;}
.search-input{flex:1;padding:1.1rem 1.6rem;font-size:1.2rem;font-family:'Nunito',sans-serif;font-weight:700;background:rgba(255,255,255,0.11);backdrop-filter:blur(12px);border:2px solid rgba(255,255,255,0.22);border-radius:50px;color:#fff;outline:none;transition:all 0.3s;}
.search-input:focus{border-color:rgba(255,255,255,0.65);background:rgba(255,255,255,0.17);}
.search-input::placeholder{color:rgba(255,255,255,0.38);}
.dropdown{position:absolute;top:calc(100% + 8px);left:0;right:0;background:rgba(4,12,30,0.97);backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,0.13);border-radius:22px;z-index:999;max-height:320px;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,0.75);display:none;}
.dropdown.open{display:block;}
.drop-item{padding:0.95rem 1.5rem;cursor:pointer;font-size:1.05rem;font-weight:700;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;gap:0.9rem;transition:background 0.15s;}
.drop-item:hover{background:rgba(0,198,255,0.18);color:#74d7ff;}
.drop-item:last-child{border-bottom:none;}
.drop-flag{font-size:1.4rem;}
.drop-sub{font-size:0.82rem;color:rgba(255,255,255,0.38);font-weight:500;}
.drop-country{color:rgba(255,255,255,0.38);font-size:0.88rem;margin-left:auto;}

/* WEATHER HERO */
.weather-hero{padding:3rem 2rem;text-align:center;margin-bottom:1.5rem;}
.w-icon{font-size:10rem;line-height:1;animation:iconFloat 4s ease-in-out infinite;filter:drop-shadow(0 10px 40px rgba(255,255,255,0.22));}
@keyframes iconFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-18px);}}
.w-city{font-family:'Bebas Neue',cursive;font-size:4.5rem;letter-spacing:5px;margin-top:0.8rem;text-shadow:0 2px 30px rgba(255,255,255,0.25);}
.w-country{font-size:1.1rem;font-weight:700;color:rgba(255,255,255,0.5);letter-spacing:3px;text-transform:uppercase;}
.w-temp{font-family:'Bebas Neue',cursive;font-size:9rem;line-height:1;text-shadow:0 0 60px rgba(255,255,255,0.18);}
.w-desc{font-size:1.6rem;font-weight:700;color:rgba(255,255,255,0.65);text-transform:capitalize;margin-top:0.3rem;}
.w-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-top:2.5rem;}
.stat{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.11);border-radius:20px;padding:1.4rem;transition:transform 0.2s;}
.stat:hover{transform:translateY(-4px);}
.stat-label{font-size:0.95rem;color:rgba(255,255,255,0.48);font-weight:700;margin-bottom:0.5rem;}
.stat-val{font-size:1.7rem;font-weight:900;}

/* DETAILS */
.details-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:1rem;}
.detail-item{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);border-radius:18px;padding:1.3rem;transition:transform 0.2s;}
.detail-item:hover{transform:translateY(-3px);}
.detail-label{font-size:0.95rem;color:rgba(255,255,255,0.43);font-weight:700;margin-bottom:0.4rem;}
.detail-val{font-size:1.4rem;font-weight:900;}

/* FORECAST */
.forecast-row{display:grid;grid-template-columns:repeat(7,1fr);gap:0.8rem;}
.fc-card{padding:1.3rem 0.6rem;text-align:center;transition:transform 0.25s;}
.fc-card:hover{transform:translateY(-6px);}
.fc-date{font-size:0.78rem;color:rgba(255,255,255,0.48);font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:0.6rem;}
.fc-icon{font-size:2.4rem;margin-bottom:0.6rem;}
.fc-max{font-size:1.4rem;font-weight:900;}
.fc-min{font-size:1rem;font-weight:700;color:rgba(255,255,255,0.5);margin-top:0.2rem;}

/* CHART */
.chart-wrap{padding:2rem;margin-bottom:1.5rem;}
.chart-canvas-wrap{position:relative;height:220px;margin-top:1rem;}
.sec-title{font-family:'Bebas Neue',cursive;font-size:2rem;letter-spacing:3px;margin-bottom:1.2rem;}

/* ERROR */
.error-box{background:rgba(255,82,82,0.13);border:1px solid rgba(255,82,82,0.55);border-radius:16px;padding:1rem 1.5rem;color:#ff8a80;font-size:1.05rem;font-weight:700;margin-bottom:1.5rem;}

/* LOADER */
.loader{width:52px;height:52px;border:4px solid rgba(255,255,255,0.1);border-top-color:#00c6ff;border-radius:50%;animation:spin 0.8s linear infinite;margin:3rem auto;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp 0.5s ease forwards;}

.gps-loading{display:inline-block;width:12px;height:12px;border:2px solid rgba(0,230,118,0.3);border-top-color:#00e676;border-radius:50%;animation:spin 0.8s linear infinite;}
footer{text-align:center;padding:2rem;color:rgba(255,255,255,0.18);font-size:1rem;font-weight:600;border-top:1px solid rgba(255,255,255,0.06);}

@media(max-width:900px){
  .w-stats{grid-template-columns:repeat(2,1fr);}
  .forecast-row{grid-template-columns:repeat(4,1fr);}
  .w-temp{font-size:5.5rem;}.w-city{font-size:3rem;}.w-icon{font-size:7rem;}
  nav{padding:1rem 1.2rem;}main{padding:1.5rem 1rem;}
}
</style>
</head>
<body>

<canvas id="skyCanvas"></canvas>
<div id="overlay"></div>

<div id="app">
  <nav>
    <div class="brand">⛅ WeatherApp</div>
    <div class="nav-right">
      <span style="color:rgba(0,230,118,0.9);font-size:0.85rem;font-weight:800;padding:0.4rem 0.9rem;background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.25);border-radius:50px;">✅ NO API KEY</span>
    </div>
  </nav>

  <main>
    <div style="text-align:center;margin-bottom:2rem;">
      <h1 style="font-family:'Bebas Neue',cursive;font-size:4.5rem;letter-spacing:5px;text-shadow:0 0 40px rgba(255,255,255,0.25);">🌍 World Weather</h1>
      <p style="color:rgba(255,255,255,0.5);font-size:1.2rem;font-weight:600;margin-top:0.5rem;">Real-time weather · 3D Live Sky · GPS · 500+ Cities · <span style="color:#00e676;">100% Free — No API Key!</span></p>
    </div>

    <div id="weatherBanner"></div>

    <!-- SEARCH -->
    <div style="position:relative;margin-bottom:2rem;" id="searchWrap">
      <div class="search-row">
        <input class="search-input" id="searchInput" placeholder="🔍  Search any city, state or country..." oninput="onSearch(this.value)" onkeydown="if(event.key==='Enter')doSearch()" autocomplete="off"/>
        <button class="btn btn-glow" onclick="doSearch()">Search</button>
        <button class="btn btn-green" onclick="getGPS()" id="gpsBtn">📍 My Location</button>
        <button class="btn btn-ghost" onclick="toggleUnits()" id="unitBtn" style="min-width:60px;">°C</button>
      </div>
      <div class="dropdown" id="dropdown"></div>
    </div>

    <div id="errorBox"></div>
    <div id="weatherOut"></div>
    <div id="chartOut"></div>
    <div id="detailsOut"></div>
    <div id="forecastOut"></div>
  </main>

  <footer>⛅ WeatherApp — Powered by <strong>Open-Meteo</strong> (Free, No API Key) + Geocoding API · 3D Sky by Three.js</footer>
</div>

<script>
// ================================================================
// THREE.JS 3D SKY
// ================================================================
const canvas = document.getElementById('skyCanvas');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 5, 30);

const SKY = {
  sunny:  {top:new THREE.Color(0x0a3d8f),mid:new THREE.Color(0x1e90ff),bot:new THREE.Color(0x87ceeb)},
  cloudy: {top:new THREE.Color(0x2e3a4a),mid:new THREE.Color(0x5a6a7a),bot:new THREE.Color(0x8899aa)},
  rainy:  {top:new THREE.Color(0x101820),mid:new THREE.Color(0x1e2e40),bot:new THREE.Color(0x304050)},
  stormy: {top:new THREE.Color(0x050810),mid:new THREE.Color(0x0d1220),bot:new THREE.Color(0x182030)},
  snowy:  {top:new THREE.Color(0x6090c0),mid:new THREE.Color(0x99c0e0),bot:new THREE.Color(0xc8e8fa)},
  night:  {top:new THREE.Color(0x01030d),mid:new THREE.Color(0x040a1a),bot:new THREE.Color(0x08142a)},
  hazy:   {top:new THREE.Color(0x5a4a30),mid:new THREE.Color(0x8a7a50),bot:new THREE.Color(0xb0a070)},
};
let cTop=new THREE.Color(0x0a3d8f),cMid=new THREE.Color(0x1e90ff),cBot=new THREE.Color(0x87ceeb);
let tTop=new THREE.Color(0x0a3d8f),tMid=new THREE.Color(0x1e90ff),tBot=new THREE.Color(0x87ceeb);
const skyMat=new THREE.ShaderMaterial({
  side:THREE.BackSide,
  uniforms:{topC:{value:cTop},midC:{value:cMid},botC:{value:cBot}},
  vertexShader:`varying vec3 vP;void main(){vP=(modelMatrix*vec4(position,1.0)).xyz;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader:`uniform vec3 topC,midC,botC;varying vec3 vP;void main(){float h=normalize(vP).y;vec3 c=h>0.0?mix(midC,topC,h*1.2):mix(midC,botC,-h*2.0);gl_FragColor=vec4(c,1.0);}`
});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(200,32,32),skyMat));
scene.add(new THREE.AmbientLight(0xffffff,0.65));
const dirLight=new THREE.DirectionalLight(0xfff5cc,1.3);
dirLight.position.set(60,80,20);scene.add(dirLight);

// SUN
const sunG=new THREE.Group(); sunG.position.set(70,55,-120);
sunG.add(new THREE.Mesh(new THREE.SphereGeometry(5.5,32,32),new THREE.MeshBasicMaterial({color:0xffe844})));
[10,16,24].forEach((r,i)=>sunG.add(new THREE.Mesh(new THREE.SphereGeometry(r,32,32),new THREE.MeshBasicMaterial({color:0xffdd00,transparent:true,opacity:0.035-i*0.01}))));
for(let i=0;i<16;i++){
  const m=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.12,10,6),new THREE.MeshBasicMaterial({color:0xffee66,transparent:true,opacity:0.5}));
  const a=(i/16)*Math.PI*2;m.position.set(Math.cos(a)*9,Math.sin(a)*9,0);m.rotation.z=a+Math.PI/2;sunG.add(m);
}
scene.add(sunG);

// MOON
const moonG=new THREE.Group(); moonG.position.set(-70,55,-120);
moonG.add(new THREE.Mesh(new THREE.SphereGeometry(4.5,32,32),new THREE.MeshBasicMaterial({color:0xe8e8cc})));
moonG.add(new THREE.Mesh(new THREE.SphereGeometry(8,32,32),new THREE.MeshBasicMaterial({color:0xcce0ff,transparent:true,opacity:0.06})));
moonG.visible=false; scene.add(moonG);

// STARS
const sBuf=new Float32Array(2000*3);
for(let i=0;i<2000;i++){const t=Math.random()*Math.PI*2,p=Math.random()*Math.PI,r=145+Math.random()*35;sBuf[i*3]=r*Math.sin(p)*Math.cos(t);sBuf[i*3+1]=Math.abs(r*Math.cos(p));sBuf[i*3+2]=r*Math.sin(p)*Math.sin(t);}
const sGeo=new THREE.BufferGeometry();sGeo.setAttribute('position',new THREE.BufferAttribute(sBuf,3));
const sMat=new THREE.PointsMaterial({color:0xffffff,size:0.5,transparent:true,opacity:0});
scene.add(new THREE.Points(sGeo,sMat));

// CLOUDS
function makeCloud(x,y,z,sc=1,dark=false){
  const g=new THREE.Group();
  [[0,0,0,3.8],[-4.5,-0.5,0.5,3.0],[4.5,-0.5,0.5,3.0],[-2.5,1.5,0,2.5],[2.5,1.5,0,2.5],[0,-1,1.5,2.2],[-1.8,-0.5,-1.2,2.0],[1.8,-0.5,-1.2,2.0]].forEach(([px,py,pz,r])=>{
    const m=new THREE.Mesh(new THREE.SphereGeometry(r*sc,14,14),new THREE.MeshPhongMaterial({color:dark?0x3a4a55:0xfafafa,transparent:true,opacity:dark?0.96:0.88,shininess:4}));
    m.position.set(px*sc,py*sc,pz*sc);g.add(m);
  });
  g.position.set(x,y,z);g.userData={baseY:y,speed:0.005+Math.random()*0.009,rnd:Math.random()*100};return g;
}
const clouds=[],darkClouds=[];
[[-95,28,-68,1.4],[-35,35,-74,1.1],[40,30,-66,1.7],[115,25,-58,1.2],[-145,20,-52,1.0],[72,42,-84,1.3],[-68,46,-94,1.5],[95,38,-78,1.1],[-155,33,-64,1.3],[135,23,-50,0.9],[-25,17,-44,1.0],[68,48,-90,1.4],[-80,55,-100,1.2],[50,20,-45,0.8]].forEach(a=>{const c=makeCloud(...a);scene.add(c);clouds.push(c);});
[[-58,22,-52,2.0,true],[22,30,-62,2.2,true],[98,20,-48,1.8,true],[-108,26,-56,2.1,true],[52,32,-72,1.9,true]].forEach(a=>{const c=makeCloud(...a);c.visible=false;scene.add(c);darkClouds.push(c);});

// RAIN
const rBuf=new Float32Array(4000*3);
for(let i=0;i<4000;i++){rBuf[i*3]=(Math.random()-0.5)*320;rBuf[i*3+1]=Math.random()*130;rBuf[i*3+2]=(Math.random()-0.5)*110;}
const rGeo=new THREE.BufferGeometry();rGeo.setAttribute('position',new THREE.BufferAttribute(rBuf,3));
const rMat=new THREE.PointsMaterial({color:0x88bbff,size:0.28,transparent:true,opacity:0});
scene.add(new THREE.Points(rGeo,rMat));

// SNOW
const snBuf=new Float32Array(2000*3);
for(let i=0;i<2000;i++){snBuf[i*3]=(Math.random()-0.5)*260;snBuf[i*3+1]=Math.random()*110;snBuf[i*3+2]=(Math.random()-0.5)*90;}
const snGeo=new THREE.BufferGeometry();snGeo.setAttribute('position',new THREE.BufferAttribute(snBuf,3));
const snMat=new THREE.PointsMaterial({color:0xffffff,size:0.8,transparent:true,opacity:0});
scene.add(new THREE.Points(snGeo,snMat));

let ltTimer=3;
const ltLight=new THREE.PointLight(0x8899ff,0,400);ltLight.position.set(0,80,-50);scene.add(ltLight);
let weatherMode='sunny';

function setWeatherMode(mode){
  if(mode===weatherMode)return;
  weatherMode=mode;
  const s=SKY[mode]||SKY.sunny;
  tTop.copy(s.top);tMid.copy(s.mid);tBot.copy(s.bot);
  const isSun=mode==='sunny',isNight=mode==='night',isStorm=mode==='stormy',isRain=mode==='rainy',isSnow=mode==='snowy',isCloudy=mode==='cloudy';
  clouds.forEach(c=>c.children.forEach(m=>{
    m.material.color.setHex(isStorm?0x2a3a45:isRain?0x6a7a88:isCloudy?0xdddddd:0xfafafa);
    m.material.opacity=isStorm||isRain?0.96:isCloudy?0.90:isSun||isNight?0.62:0.82;
  }));
  darkClouds.forEach(c=>c.visible=isStorm||isRain);
  rMat.opacity=isRain?0.72:isStorm?0.92:0;
  snMat.opacity=isSnow?0.88:0;
  sMat.opacity=isNight?0.92:0;
  moonG.visible=isNight;sunG.visible=!isNight;
  dirLight.intensity=isSun?1.4:isNight?0:isStorm?0.2:0.5;
  const msgs={sunny:'☀️ Clear Sky — Sunny & Beautiful',cloudy:'☁️ Overcast — Cloudy Skies',rainy:'🌧️ Rainy — Bring your umbrella!',stormy:'⛈️ Thunderstorm — Stay indoors!',snowy:'❄️ Snowy — Winter Wonderland!',night:'🌙 Clear Night — Starry Skies',hazy:'🌫️ Hazy — Low Visibility'};
  const b=document.getElementById('weatherBanner');b.style.display='block';b.textContent=msgs[mode]||'';
}

const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  cTop.lerp(tTop,0.012);cMid.lerp(tMid,0.012);cBot.lerp(tBot,0.012);
  skyMat.uniforms.topC.value.copy(cTop);skyMat.uniforms.midC.value.copy(cMid);skyMat.uniforms.botC.value.copy(cBot);
  clouds.forEach(c=>{c.position.x+=c.userData.speed;if(c.position.x>210)c.position.x=-190;c.position.y=c.userData.baseY+Math.sin(t*0.18+c.userData.rnd)*2;c.rotation.y=t*0.012;});
  darkClouds.forEach(c=>{c.position.x+=c.userData.speed*1.8;if(c.position.x>190)c.position.x=-170;c.position.y=20+Math.sin(t*0.28+c.userData.rnd)*1.2;});
  sunG.rotation.z=t*0.07;sunG.position.y=55+Math.sin(t*0.035)*3;
  moonG.position.y=55+Math.cos(t*0.03)*2.5;
  if(rMat.opacity>0){const p=rGeo.attributes.position.array;for(let i=0;i<4000;i++){p[i*3+1]-=1.8;if(p[i*3+1]<-25)p[i*3+1]=120;}rGeo.attributes.position.needsUpdate=true;}
  if(snMat.opacity>0){const p=snGeo.attributes.position.array;for(let i=0;i<2000;i++){p[i*3+1]-=0.25;p[i*3]+=Math.sin(t+i*0.08)*0.04;if(p[i*3+1]<-25)p[i*3+1]=105;}snGeo.attributes.position.needsUpdate=true;}
  if(weatherMode==='stormy'){ltTimer-=0.016;if(ltTimer<=0){ltLight.intensity=25+Math.random()*30;ltLight.position.set((Math.random()-0.5)*120,75,-45);ltTimer=1.5+Math.random()*4;setTimeout(()=>ltLight.intensity=0,100+Math.random()*120);}}else ltLight.intensity=0;
  camera.position.x=Math.sin(t*0.032)*3.5;camera.position.y=5+Math.cos(t*0.022)*1.8;camera.lookAt(0,15,-50);
  renderer.render(scene,camera);
}
animate();

let demoModes=['sunny','cloudy','rainy','stormy','snowy','night'],demoIdx=0;
let demoInt=setInterval(()=>{if(!hasSearched){demoIdx=(demoIdx+1)%demoModes.length;setWeatherMode(demoModes[demoIdx]);}},5000);

// SEARCH
function onSearch(val){
  const dd=document.getElementById('dropdown');
  if(val.length<2){dd.classList.remove('open');return;}
  const q=val.toLowerCase();
  const res=CITIES.filter(c=>c.city.toLowerCase().includes(q)||c.country.toLowerCase().includes(q)||(c.state&&c.state.toLowerCase().includes(q))).slice(0,10);
  if(!res.length){dd.classList.remove('open');return;}
  dd.innerHTML=res.map(r=>`<div class="drop-item" onmousedown="selectCity('${r.city.replace(/'/g,"\\'")}',${r.lat},${r.lon},'${r.country.replace(/'/g,"\\'")}','${r.flag}')">
    <span class="drop-flag">${r.flag}</span>
    <div><div>${r.city}</div><div class="drop-sub">${r.state?r.state+', ':''}</div></div>
    <span class="drop-country">${r.country}</span>
  </div>`).join('');
  dd.classList.add('open');
}

document.addEventListener('click',e=>{if(!e.target.closest('#searchWrap'))document.getElementById('dropdown').classList.remove('open');});

function selectCity(city,lat,lon,country,flag){
  document.getElementById('searchInput').value=city;
  document.getElementById('dropdown').classList.remove('open');
  fetchWeatherByCoords(lat,lon,city,country,flag);
}

function doSearch(){
  const val=document.getElementById('searchInput').value.trim();
  if(!val)return;
  // Try to find in local list first
  const found=CITIES.find(c=>c.city.toLowerCase()===val.toLowerCase());
  if(found){fetchWeatherByCoords(found.lat,found.lon,found.city,found.country,found.flag);}
  else{geocodeAndFetch(val);}
  document.getElementById('dropdown').classList.remove('open');
}

// GEOCODE using Open-Meteo geocoding (also free!)
async function geocodeAndFetch(cityName){
  showLoader();
  try{
    const res=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityName)}&count=1&language=en&format=json`);
    const data=await res.json();
    if(!data.results||!data.results.length) throw new Error('City not found. Try another spelling.');
    const r=data.results[0];
    fetchWeatherByCoords(r.latitude,r.longitude,r.name,r.country,'🌍');
  }catch(e){
    document.getElementById('errorBox').innerHTML=`<div class="error-box">⚠️ ${e.message}</div>`;
    document.getElementById('weatherOut').innerHTML='';
  }
}

// GPS
function getGPS(){
  if(!navigator.geolocation){alert('GPS not supported in your browser!');return;}
  const btn=document.getElementById('gpsBtn');
  btn.innerHTML='<span class="gps-loading"></span> Locating...';
  btn.style.pointerEvents='none';
  navigator.geolocation.getCurrentPosition(
    pos=>{
      btn.innerHTML='📍 My Location';btn.style.pointerEvents='auto';
      fetchWeatherByCoords(pos.coords.latitude,pos.coords.longitude,'My Location','','📍');
    },
    ()=>{btn.innerHTML='📍 My Location';btn.style.pointerEvents='auto';alert('Please allow location access!');}
  );
}

function toggleUnits(){
  currentUnits=currentUnits==='metric'?'imperial':'metric';
  document.getElementById('unitBtn').textContent=currentUnits==='metric'?'°C':'°F';
  // Re-fetch if we have data
  const inp=document.getElementById('searchInput').value.trim();
  if(inp&&hasSearched) doSearch();
}

function showLoader(){
  document.getElementById('errorBox').innerHTML='';
  document.getElementById('weatherOut').innerHTML='<div class="loader"></div>';
  document.getElementById('chartOut').innerHTML='';
  document.getElementById('detailsOut').innerHTML='';
  document.getElementById('forecastOut').innerHTML='';
}

// ================================================================
// MAIN WEATHER FETCH — OPEN-METEO (NO API KEY!)
// ================================================================
async function fetchWeatherByCoords(lat,lon,cityName,country,flag){
  if(demoInt){clearInterval(demoInt);demoInt=null;}
  hasSearched=true;
  showLoader();

  try{
    // Fetch current + hourly + daily all in one call
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,surface_pressure,visibility,cloud_cover&hourly=temperature_2m,apparent_temperature,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,precipitation_sum,wind_speed_10m_max&timezone=auto&forecast_days=7&wind_speed_unit=${currentUnits==='imperial'?'mph':'ms'}`;

    const res=await fetch(url);
    if(!res.ok) throw new Error('Weather data not available');
    const data=await res.json();

    const cur=data.current;
    const daily=data.daily;
    const hourly=data.hourly;
    const wmo=getWMO(cur.weather_code);
    const u=currentUnits==='metric'?'°C':'°F';
    const sp=currentUnits==='metric'?'m/s':'mph';

    // Convert temp if imperial
    let temp=cur.temperature_2m;
    let feelsLike=cur.apparent_temperature;
    if(currentUnits==='imperial'){temp=temp*9/5+32;feelsLike=feelsLike*9/5+32;}

    // Night check
    const h=new Date().getHours();
    let skyMode=wmo.mode;
    if((h<6||h>=20)&&(skyMode==='sunny'||skyMode==='cloudy')) skyMode='night';
    setWeatherMode(skyMode);

    // CURRENT WEATHER CARD
    document.getElementById('weatherOut').innerHTML=`
    <div class="glass weather-hero fade-up">
      <div class="w-icon">${wmo.icon}</div>
      <div class="w-city">${flag} ${cityName}</div>
      <div class="w-country">${country}</div>
      <div class="w-temp">${Math.round(temp)}${u}</div>
      <div class="w-desc">${wmo.label}</div>
      <div class="w-stats">
        <div class="stat"><div class="stat-label">🌡️ Feels Like</div><div class="stat-val">${Math.round(feelsLike)}${u}</div></div>
        <div class="stat"><div class="stat-label">💧 Humidity</div><div class="stat-val">${cur.relative_humidity_2m}%</div></div>
        <div class="stat"><div class="stat-label">💨 Wind</div><div class="stat-val">${cur.wind_speed_10m} ${sp}</div></div>
        <div class="stat"><div class="stat-label">🔵 Pressure</div><div class="stat-val">${cur.surface_pressure} hPa</div></div>
      </div>
    </div>`;

    // TEMPERATURE CHART (next 24 hours)
    const next24=hourly.time.slice(0,24);
    const next24temps=hourly.temperature_2m.slice(0,24).map(t=>currentUnits==='imperial'?Math.round(t*9/5+32):Math.round(t));
    const next24feels=hourly.apparent_temperature.slice(0,24).map(t=>currentUnits==='imperial'?Math.round(t*9/5+32):Math.round(t));
    const chartLabels=next24.map(t=>new Date(t).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}));

    document.getElementById('chartOut').innerHTML=`
    <div class="glass-dark chart-wrap fade-up">
      <div class="sec-title">📊 Temperature — Next 24 Hours</div>
      <div class="chart-canvas-wrap"><canvas id="tempChart"></canvas></div>
    </div>`;

    setTimeout(()=>{
      const cv=document.getElementById('tempChart');
      if(!cv)return;
      if(tempChart)tempChart.destroy();
      tempChart=new Chart(cv,{
        type:'line',
        data:{
          labels:chartLabels,
          datasets:[
            {label:`Temperature (${u})`,data:next24temps,borderColor:'rgba(0,198,255,0.9)',backgroundColor:'rgba(0,198,255,0.1)',borderWidth:3,pointBackgroundColor:'#00c6ff',pointRadius:4,tension:0.4,fill:true},
            {label:`Feels Like (${u})`,data:next24feels,borderColor:'rgba(255,150,50,0.8)',backgroundColor:'transparent',borderWidth:2,pointRadius:3,tension:0.4,borderDash:[5,4]}
          ]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{legend:{labels:{color:'rgba(255,255,255,0.7)',font:{family:'Nunito',size:12,weight:'700'}}},tooltip:{backgroundColor:'rgba(0,0,0,0.8)',titleColor:'#fff',bodyColor:'rgba(255,255,255,0.8)'}},
          scales:{
            x:{ticks:{color:'rgba(255,255,255,0.5)',font:{family:'Nunito',size:10},maxTicksLimit:8},grid:{color:'rgba(255,255,255,0.05)'}},
            y:{ticks:{color:'rgba(255,255,255,0.5)',font:{family:'Nunito',size:11},callback:v=>v+u},grid:{color:'rgba(255,255,255,0.05)'}}
          }
        }
      });
    },100);

    // DETAILS
    const sunrise=new Date(daily.sunrise[0]).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    const sunset=new Date(daily.sunset[0]).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    const visKm=cur.visibility?`${(cur.visibility/1000).toFixed(1)} km`:'N/A';
    let maxT=daily.temperature_2m_max[0], minT=daily.temperature_2m_min[0];
    if(currentUnits==='imperial'){maxT=Math.round(maxT*9/5+32);minT=Math.round(minT*9/5+32);}else{maxT=Math.round(maxT);minT=Math.round(minT);}

    document.getElementById('detailsOut').innerHTML=`
    <div class="glass-dark fade-up" style="padding:2rem;margin-bottom:1.5rem;">
      <div class="sec-title">🔍 Weather Details</div>
      <div class="details-grid">
        <div class="detail-item"><div class="detail-label">🌅 Sunrise</div><div class="detail-val">${sunrise}</div></div>
        <div class="detail-item"><div class="detail-label">🌇 Sunset</div><div class="detail-val">${sunset}</div></div>
        <div class="detail-item"><div class="detail-label">👁️ Visibility</div><div class="detail-val">${visKm}</div></div>
        <div class="detail-item"><div class="detail-label">☁️ Cloud Cover</div><div class="detail-val">${cur.cloud_cover}%</div></div>
        <div class="detail-item"><div class="detail-label">🌡️ Max Today</div><div class="detail-val">${maxT}°</div></div>
        <div class="detail-item"><div class="detail-label">🌡️ Min Today</div><div class="detail-val">${minT}°</div></div>
        <div class="detail-item"><div class="detail-label">🌧️ Rain Today</div><div class="detail-val">${daily.precipitation_sum[0]} mm</div></div>
        <div class="detail-item"><div class="detail-label">💨 Max Wind</div><div class="detail-val">${daily.wind_speed_10m_max[0]} ${sp}</div></div>
      </div>
    </div>`;

    // 7-DAY FORECAST
    document.getElementById('forecastOut').innerHTML=`
    <div class="fade-up" style="margin-bottom:2rem;">
      <div class="sec-title">📅 7-Day Forecast</div>
      <div class="forecast-row">${daily.time.map((day,i)=>{
        const dt=new Date(day);
        const w=getWMO(daily.weather_code[i]);
        let mx=daily.temperature_2m_max[i], mn=daily.temperature_2m_min[i];
        if(currentUnits==='imperial'){mx=Math.round(mx*9/5+32);mn=Math.round(mn*9/5+32);}else{mx=Math.round(mx);mn=Math.round(mn);}
        return `<div class="glass fc-card">
          <div class="fc-date">${i===0?'TODAY':dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</div>
          <div class="fc-icon">${w.icon}</div>
          <div class="fc-max">${mx}${u}</div>
          <div class="fc-min">${mn}${u}</div>
        </div>`;
      }).join('')}</div>
    </div>`;

    document.getElementById('errorBox').innerHTML='';

  }catch(e){
    document.getElementById('weatherOut').innerHTML='';
    document.getElementById('errorBox').innerHTML=`<div class="error-box">⚠️ ${e.message}</div>`;
  }
}

// Auto-detect user location on load
window.addEventListener('load',()=>{
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      if(!hasSearched) fetchWeatherByCoords(pos.coords.latitude,pos.coords.longitude,'My Location','','📍');
    },()=>{});
  }
});
</script>
</body>
</html>
